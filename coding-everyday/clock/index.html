<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS clock</title>
</head>
<body>

    <div class="clock">
        <div class="time">
            <div class="hand hour"></div>
            <div class="hand minute"></div>
            <div class="hand second"></div>
        </div>
    </div>

    <style>
        html {
            background-color: #fb8500;
            background-size: cover;
            font-family: 'helvetica neue';
            text-align: center;
            font-size: 10px;
        }

        body {
            margin: 0;
            font-size: 2rem;
            color: #023047;
            display: flex;
            flex: 1;
            align-items: center;
            min-height: 100vh;
        }

        .clock {
            height: 30rem;
            width: 30rem;
            border: 20px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 50px auto;
            position: relative;
            padding: 2rem;
        }

        .time {
            position: relative;
            width: 100%;
            height: 100%;
            display:flex;
            justify-content: center;
            align-items:center;
            transform: translateY(-3px);

        }

        .hand {
            width: 50%;
            height: 6px;
            background: #023047;
            position: absolute;
            top: 50%;
            border-radius: 10px;
            transform: translateX(-50%);
        }

    </style>
</body>
</html>
